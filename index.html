<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PokéScan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3d;
    --yellow:#f5c842;--blue:#4a9eff;--red:#ff4a6e;--green:#3dffa0;
    --text:#e8e8f0;--muted:#6b6b8a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(74,158,255,.07) 0%,transparent 60%),
               radial-gradient(ellipse 50% 50% at 80% 80%,rgba(245,200,66,.05) 0%,transparent 60%);}
  .container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:32px 16px 80px;}

  header{text-align:center;margin-bottom:28px;}
  .logo-line{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;}
  .pokeball-icon{width:32px;height:32px;flex-shrink:0;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,8vw,3.8rem);letter-spacing:3px;line-height:1;
    background:linear-gradient(135deg,var(--yellow) 0%,#ffaa00 40%,var(--blue) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .tagline{color:var(--muted);font-size:.82rem;letter-spacing:2px;text-transform:uppercase;font-weight:500;}

  .upload-zone{background:var(--surface);border:2px dashed var(--border);border-radius:18px;padding:36px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s,transform .2s;}
  .upload-zone:hover{border-color:var(--yellow);background:#14141f;transform:translateY(-2px);}
  .upload-zone.drag-over{border-color:var(--blue);background:rgba(74,158,255,.05);}
  .upload-icon{font-size:2.5rem;margin-bottom:8px;display:block;}
  .upload-title{font-size:.98rem;font-weight:600;color:var(--text);margin-bottom:4px;}
  .upload-sub{font-size:.8rem;color:var(--muted);}
  #fileInputGallery,#fileInputCamera{position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;}

  .action-row{display:flex;gap:10px;margin-top:12px;}
  .btn{flex:1;padding:13px 12px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:#22223a;border-color:var(--blue);}
  .btn-secondary:active{transform:scale(.97);}

  .preview-wrap{margin-top:14px;display:none;position:relative;}
  .preview-wrap.show{display:block;}
  .preview-img{width:100%;max-height:320px;object-fit:contain;border-radius:14px;border:1px solid var(--border);background:var(--surface);}
  .preview-clear{position:absolute;top:10px;right:10px;background:rgba(10,10,15,.85);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 11px;font-size:.76rem;cursor:pointer;font-family:inherit;font-weight:600;}
  .preview-clear:hover{background:rgba(255,74,110,.2);border-color:var(--red);}

  .scan-btn-wrap{margin-top:14px;display:none;}
  .scan-btn-wrap.show{display:block;}
  .btn-scan{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:3px;background:linear-gradient(135deg,var(--yellow),#ffaa00);color:#0a0a0f;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-tap-highlight-color:transparent;}
  .btn-scan:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,200,66,.3);}
  .btn-scan:active{transform:scale(.98);}
  .btn-scan:disabled{background:#2a2a3d;color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}

  /* Loading */
  .loading{display:none;padding:32px 20px;}
  .loading.show{display:block;}
  .pokeball-spin{width:48px;height:48px;margin:0 auto 14px;animation:spin 1s linear infinite;display:block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-title{text-align:center;font-size:.9rem;color:var(--muted);margin-bottom:16px;}

  /* Step list */
  .step-list{display:flex;flex-direction:column;gap:8px;}
  .step-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:.84rem;color:var(--muted);transition:all .3s;}
  .step-item.active{border-color:var(--yellow);color:var(--text);background:#14141f;}
  .step-item.done{border-color:rgba(61,255,160,.3);color:var(--green);background:rgba(61,255,160,.04);}
  .step-item.error{border-color:rgba(255,74,110,.3);color:#ff8a9e;}
  .step-icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center;}
  .step-text{flex:1;}
  .step-sub{font-size:.74rem;color:var(--muted);margin-top:2px;}

  .error-box{display:none;background:rgba(255,74,110,.08);border:1px solid rgba(255,74,110,.3);border-radius:12px;padding:14px 18px;margin-top:14px;font-size:.86rem;color:#ff8a9e;line-height:1.5;}
  .error-box.show{display:block;animation:fadeUp .3s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* Results */
  .results{display:none;margin-top:24px;}
  .results.show{display:block;animation:fadeUp .4s ease both;}
  .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .results-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--yellow);}
  .results-count{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 11px;font-size:.77rem;color:var(--muted);font-weight:600;}

  .summary-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .summary-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px 11px;font-size:.76rem;color:var(--muted);font-weight:500;}
  .summary-pill span{color:var(--text);font-weight:700;}

  /* Card result rows */
  .card-list{display:flex;flex-direction:column;gap:8px;}
  .card-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s;}
  .card-row.confirmed{border-color:rgba(61,255,160,.25);}
  .card-row.unconfirmed{border-color:rgba(245,200,66,.2);}
  .card-row.failed{border-color:rgba(255,74,110,.2);}

  .card-row-header{display:grid;grid-template-columns:26px auto 1fr auto;gap:10px;align-items:center;padding:12px 14px;cursor:pointer;}
  .card-index{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);text-align:center;}
  .card-thumb{width:38px;height:53px;object-fit:contain;border-radius:5px;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;}
  .card-thumb.no-img{display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--muted);}
  .card-info{min-width:0;}
  .card-name{font-weight:700;font-size:.94rem;color:var(--text);margin-bottom:2px;}
  .card-meta{font-size:.76rem;color:var(--muted);}
  .card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .card-number{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--yellow);letter-spacing:1px;}
  .status-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.5px;}
  .status-confirmed{background:rgba(61,255,160,.12);color:var(--green);border:1px solid rgba(61,255,160,.25);}
  .status-partial{background:rgba(245,200,66,.12);color:var(--yellow);border:1px solid rgba(245,200,66,.25);}
  .status-failed{background:rgba(255,74,110,.1);color:#ff8a9e;border:1px solid rgba(255,74,110,.2);}

  /* Expanded */
  .card-detail{display:none;padding:0 14px 14px;}
  .card-detail.show{display:block;animation:fadeUp .2s both;}
  .detail-divider{height:1px;background:var(--border);margin-bottom:12px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  @media(max-width:400px){.detail-grid{grid-template-columns:1fr}}
  .detail-item{background:var(--surface2);border-radius:8px;padding:8px 10px;border:1px solid var(--border);}
  .detail-label{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:2px;}
  .detail-value{font-size:.85rem;font-weight:600;color:var(--text);}
  .detail-value.yellow{color:var(--yellow);}
  .detail-value.green{color:var(--green);}
  .detail-value.blue{color:var(--blue);}
  .detail-note{font-size:.78rem;color:var(--muted);line-height:1.55;margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}

  /* Versions list */
  .versions-label{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin:10px 0 6px;}
  .versions-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .versions-scroll::-webkit-scrollbar{height:3px;}
  .versions-scroll::-webkit-scrollbar-track{background:var(--surface);}
  .versions-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
  .version-item{flex-shrink:0;text-align:center;cursor:pointer;opacity:.6;transition:opacity .15s;}
  .version-item.selected{opacity:1;}
  .version-item:hover{opacity:.9;}
  .version-img{width:52px;height:72px;object-fit:contain;border-radius:6px;border:2px solid transparent;background:var(--surface2);}
  .version-item.selected .version-img{border-color:var(--yellow);}
  .version-num{font-size:.65rem;color:var(--muted);margin-top:3px;}

  .reset-btn{width:100%;margin-top:16px;padding:11px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .18s;}
  .reset-btn:hover{border-color:var(--blue);color:var(--text);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;max-width:480px;width:100%;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;margin-bottom:14px;}
  video{width:100%;border-radius:10px;background:#000;margin-bottom:12px;}
  canvas{display:none;}
  .modal-actions{display:flex;gap:10px;}
</style>
</head>
<body>

<input type="file" id="fileInputGallery" accept="image/*">
<input type="file" id="fileInputCamera" accept="image/*" capture="environment">

<div class="container">
  <header>
    <div class="logo-line">
      <svg class="pokeball-icon" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="18" stroke="#f5c842" stroke-width="2"/>
        <path d="M1 19h36" stroke="#f5c842" stroke-width="2"/>
        <circle cx="19" cy="19" r="6" fill="#0a0a0f" stroke="#f5c842" stroke-width="2"/>
        <circle cx="19" cy="19" r="3" fill="#f5c842"/>
        <path d="M2 13a18 18 0 0 1 34 0" fill="rgba(255,74,110,0.15)"/>
      </svg>
      <h1>PokéScan</h1>
    </div>
    <p class="tagline">Identificador Visual de Cartas</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <span class="upload-icon">📦</span>
    <p class="upload-title">Foto com uma ou várias cartas</p>
    <p class="upload-sub">A IA identifica visualmente cada carta e confirma o número via TCGDex</p>
  </div>

  <div class="action-row">
    <button class="btn btn-secondary" id="btnGallery">🖼️ Galeria</button>
    <button class="btn btn-secondary" id="btnCamera">📷 Câmera</button>
    <button class="btn btn-secondary" id="btnLive">🎥 Ao Vivo</button>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img class="preview-img" id="previewImg" src="" alt="">
    <button class="preview-clear" id="clearBtn">✕ Remover</button>
  </div>

  <div class="scan-btn-wrap" id="scanBtnWrap">
    <button class="btn-scan" id="scanBtn">🔍 IDENTIFICAR CARTAS</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- Loading with step list -->
  <div class="loading" id="loading">
    <svg class="pokeball-spin" viewBox="0 0 56 56" fill="none">
      <circle cx="28" cy="28" r="27" stroke="#2a2a3d" stroke-width="2"/>
      <path d="M1 28h54" stroke="#f5c842" stroke-width="2"/>
      <path d="M2 22a27 27 0 0 1 52 0" fill="rgba(255,74,110,0.15)"/>
      <circle cx="28" cy="28" r="9" fill="#0a0a0f" stroke="#f5c842" stroke-width="2"/>
      <circle cx="28" cy="28" r="4" fill="#f5c842"/>
      <path d="M1 28 A27 27 0 0 1 55 28" stroke="#4a9eff" stroke-width="2" stroke-dasharray="4 4"/>
    </svg>
    <p class="loading-title">Analisando...</p>
    <div class="step-list" id="stepList"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">Cartas Identificadas</div>
      <div class="results-count" id="resultsCount">0</div>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="card-list" id="cardList"></div>
    <button class="reset-btn" id="resetBtn">↩ Analisar outra foto</button>
  </div>
</div>

<div class="modal-overlay" id="cameraModal">
  <div class="modal">
    <div class="modal-title">📷 Câmera ao Vivo</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="captureBtn" style="flex:2;background:var(--yellow);color:#0a0a0f;border:none;font-weight:700;">⚡ Capturar</button>
      <button class="btn btn-secondary" id="closeCameraBtn" style="flex:1;">Fechar</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let currentImageBase64 = null;
let stream = null;

// ─── DOM ─────────────────────────────────────────────────
const fileGallery = document.getElementById('fileInputGallery');
const fileCamera  = document.getElementById('fileInputCamera');
const uploadZone  = document.getElementById('uploadZone');
const previewWrap = document.getElementById('previewWrap');
const previewImg  = document.getElementById('previewImg');
const scanBtnWrap = document.getElementById('scanBtnWrap');
const scanBtn     = document.getElementById('scanBtn');
const loadingEl   = document.getElementById('loading');
const errorBox    = document.getElementById('errorBox');
const resultsEl   = document.getElementById('results');

// ─── File input (mobile-safe) ─────────────────────────────
document.getElementById('btnGallery').addEventListener('click', () => { fileGallery.value=''; fileGallery.click(); });
document.getElementById('btnCamera').addEventListener('click',  () => { fileCamera.value='';  fileCamera.click(); });
uploadZone.addEventListener('click', () => { fileGallery.value=''; fileGallery.click(); });
fileGallery.addEventListener('change', e => { if(e.target.files[0]) loadImage(e.target.files[0]); });
fileCamera.addEventListener('change',  e => { if(e.target.files[0]) loadImage(e.target.files[0]); });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) loadImage(f);
});

function loadImage(file) {
  // Compress if > 3MB
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const maxW = 1600;
    let w = img.width, h = img.height;
    if(w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    const cv = document.createElement('canvas');
    cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    currentImageBase64 = cv.toDataURL('image/jpeg',.85).split(',')[1];
    previewImg.src = cv.toDataURL('image/jpeg',.85);
    previewWrap.classList.add('show');
    scanBtnWrap.classList.add('show');
    resultsEl.classList.remove('show');
    errorBox.classList.remove('show');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

document.getElementById('clearBtn').addEventListener('click', resetAll);
document.getElementById('resetBtn').addEventListener('click', () => { resetAll(); window.scrollTo({top:0,behavior:'smooth'}); });
function resetAll() {
  previewWrap.classList.remove('show');
  scanBtnWrap.classList.remove('show');
  resultsEl.classList.remove('show');
  errorBox.classList.remove('show');
  currentImageBase64 = null;
}

// ─── Live camera ──────────────────────────────────────────
document.getElementById('btnLive').addEventListener('click', async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    document.getElementById('video').srcObject = stream;
    document.getElementById('cameraModal').classList.add('show');
  } catch { showError('Não foi possível acessar a câmera.'); }
});
document.getElementById('closeCameraBtn').addEventListener('click', stopCamera);
document.getElementById('captureBtn').addEventListener('click', () => {
  const v=document.getElementById('video'), c=document.getElementById('canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  const url=c.toDataURL('image/jpeg',.85);
  currentImageBase64=url.split(',')[1];
  previewImg.src=url;
  previewWrap.classList.add('show'); scanBtnWrap.classList.add('show');
  resultsEl.classList.remove('show'); errorBox.classList.remove('show');
  stopCamera();
});
function stopCamera() {
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  document.getElementById('cameraModal').classList.remove('show');
}

// ─── Step UI ──────────────────────────────────────────────
let steps = [];
function initSteps(list) {
  steps = list;
  const el = document.getElementById('stepList');
  el.innerHTML = list.map((s,i) => `
    <div class="step-item" id="step-${i}">
      <div class="step-icon" id="step-icon-${i}">⏳</div>
      <div class="step-text">
        <div id="step-label-${i}">${s}</div>
        <div class="step-sub" id="step-sub-${i}"></div>
      </div>
    </div>`).join('');
}
function setStep(i, state, sub='') {
  const el = document.getElementById(`step-${i}`);
  const icon = document.getElementById(`step-icon-${i}`);
  const subEl = document.getElementById(`step-sub-${i}`);
  if(!el) return;
  el.className = 'step-item ' + state;
  icon.textContent = state==='done' ? '✅' : state==='active' ? '🔄' : state==='error' ? '❌' : '⏳';
  if(sub) subEl.textContent = sub;
}

// ─── Main flow ────────────────────────────────────────────
scanBtn.addEventListener('click', () => { if(currentImageBase64) runAnalysis(); });

async function runAnalysis() {
  scanBtn.disabled = true;
  loadingEl.classList.add('show');
  resultsEl.classList.remove('show');
  errorBox.classList.remove('show');

  initSteps([
    'Detectando cartas na foto...',
    'Buscando versões no TCGDex...',
    'Comparação visual (IA)...',
    'Montando resultados...'
  ]);

  try {
    // ── STEP 1: Claude extracts card names + basic info ──
    setStep(0, 'active');
    const names = await extractCardNames();
    setStep(0, 'done', `${names.length} carta(s) detectada(s)`);

    if(!names.length) throw new Error('Nenhuma carta detectada na imagem.');

    // ── STEP 2: TCGDex fetch all versions for each card ──
    setStep(1, 'active');
    const tcgVersionsArr = await fetchAllVersions(names);
    const found = tcgVersionsArr.filter(v => v.versions.length > 0).length;
    setStep(1, 'done', `${found}/${names.length} encontradas no TCGDex`);

    // ── STEP 3: Claude visual match ──
    setStep(2, 'active');
    const matched = await visualMatch(names, tcgVersionsArr);
    setStep(2, 'done', 'Comparação concluída');

    // ── STEP 4: Render ──
    setStep(3, 'active');
    loadingEl.classList.remove('show');
    renderResults(matched, tcgVersionsArr);
    setStep(3, 'done');

  } catch(e) {
    loadingEl.classList.remove('show');
    showError('Erro: ' + e.message);
  }

  scanBtn.disabled = false;
}

// ── STEP 1: Extract names ─────────────────────────────────
async function extractCardNames() {
  const prompt = `Você é especialista em Pokémon TCG. Analise esta foto.

Liste TODAS as cartas Pokémon visíveis. Para cada uma extraia apenas:
- name: nome da carta (em português se PT-BR, translitere se japonesa)
- hp: HP visível no topo
- language: PT-BR, EN, JP ou KR
- position: ex "Linha 1, coluna 2"
- types: tipos visíveis (Fogo, Água, etc)
- is_trainer: true se for carta de Treinador/Suporte/Estádio

Responda SOMENTE JSON válido:
{
  "cards": [
    {"name":"Charizard ex","hp":"330","language":"PT-BR","position":"Linha 1, col 1","types":["Fogo"],"is_trainer":false},
    {"name":"Favor da Misty","hp":null,"language":"PT-BR","position":"Linha 2, col 3","types":[],"is_trainer":true}
  ]
}
Responda SOMENTE o JSON.`;

  const r = await callAPI(prompt, 2000);
  return r.cards || [];
}

// ── STEP 2: TCGDex - fetch all versions ───────────────────
async function fetchAllVersions(cards) {
  const results = await Promise.all(cards.map(async card => {
    const versions = await fetchVersionsForCard(card.name, card.is_trainer);
    return { card, versions };
  }));
  return results;
}

async function fetchVersionsForCard(name, isTrainer) {
  // Normalize name for search
  const searchName = normalizeName(name);
  const allVersions = [];

  // Try TCGDex search
  try {
    const res = await fetch(`https://api.tcgdex.net/v2/en/cards?name=${encodeURIComponent(searchName)}`);
    if(res.ok) {
      const arr = await res.json();
      if(Array.isArray(arr)) {
        // Fetch details for up to 8 versions (enough to compare)
        const toFetch = arr.slice(0, 8);
        const details = await Promise.allSettled(
          toFetch.map(c => fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`).then(r => r.ok ? r.json() : null))
        );
        details.forEach(d => {
          if(d.status==='fulfilled' && d.value?.id) allVersions.push(d.value);
        });
      }
    }
  } catch {}

  // If no results, try first word only
  if(!allVersions.length) {
    try {
      const firstWord = searchName.split(' ')[0];
      const res = await fetch(`https://api.tcgdex.net/v2/en/cards?name=${encodeURIComponent(firstWord)}`);
      if(res.ok) {
        const arr = await res.json();
        if(Array.isArray(arr)) {
          const toFetch = arr.slice(0,6);
          const details = await Promise.allSettled(
            toFetch.map(c => fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`).then(r => r.ok ? r.json() : null))
          );
          details.forEach(d => {
            if(d.status==='fulfilled' && d.value?.id) allVersions.push(d.value);
          });
        }
      }
    } catch {}
  }

  return allVersions;
}

function normalizeName(name) {
  // Common PT-BR → EN translations for search
  const map = {
    'Charizard ex': 'Charizard ex',
    'Pikachu ex': 'Pikachu ex',
    'Mewtwo ex': 'Mewtwo ex',
    'Greninja ex': 'Greninja ex',
    'Zekrom ex': 'Zekrom ex',
    'Favor da Misty': "Misty's Favor",
    'Pokéboneco da Lilian': "Lillie's Poké Doll",
    'Mega Latias ex': 'Mega Latias EX',
    'Mega Kyogre ex': 'Mega Kyogre EX',
    'Mega Gardevoir ex': 'Mega Gardevoir EX',
    'Mega Dragonite ex': 'Mega Dragonite EX',
    'Mega Lopunny ex': 'Mega Lopunny EX',
  };
  return map[name] || name;
}

// ── STEP 3: Visual matching ───────────────────────────────
async function visualMatch(cards, tcgVersionsArr) {
  // Build a list with versions info to send to Claude
  const cardSummaries = tcgVersionsArr.map((item, i) => {
    const versions = item.versions.map(v => ({
      id: v.id,
      localId: v.localId,
      set: v.set?.name,
      setId: v.set?.id,
      total: v.set?.cardCount?.total,
      rarity: v.rarity,
      image: v.image ? v.image + '/low.webp' : null,
    }));
    return {
      index: i,
      name: item.card.name,
      position: item.card.position,
      language: item.card.language,
      hp: item.card.hp,
      types: item.card.types,
      is_trainer: item.card.is_trainer,
      versions_count: versions.length,
      versions: versions,
    };
  });

  const prompt = `Você é especialista em Pokémon TCG. Tenho uma foto com várias cartas.

Para cada carta listada abaixo, escolha qual versão do TCGDex corresponde VISUALMENTE à carta na foto.
Compare: arte, borda, moldura, cores, estilo holográfico, idioma.

Dados das cartas encontradas no TCGDex:
${JSON.stringify(cardSummaries, null, 1)}

Retorne SOMENTE JSON válido:
{
  "matches": [
    {
      "index": 0,
      "name": "Charizard ex",
      "matched_id": "obf-125",
      "matched_set": "Obsidian Flames",
      "matched_set_id": "obf",
      "matched_local_id": "125",
      "matched_total": "197",
      "matched_rarity": "Special Illustration Rare",
      "confidence": "high",
      "reason": "Arte full art flamejante, borda dourada, corresponde exatamente ao OBF-125"
    }
  ]
}

confidence: "high" (certeza), "medium" (provável), "low" (melhor opção disponível)
Se não houver versão compatível, use matched_id: null.
Responda SOMENTE o JSON.`;

  const r = await callAPI(prompt, 3000);
  return r.matches || [];
}

// ── API call ──────────────────────────────────────────────
async function callAPI(prompt, maxTokens) {
  const res = await fetch('/api/analyze', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:currentImageBase64}},
        {type:'text',text:prompt}
      ]}]
    })
  });
  if(!res.ok) throw new Error('API ' + res.status);
  const d = await res.json();
  if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
  if(!d.content || !d.content.length) throw new Error('API sem conteudo: ' + JSON.stringify(d).substring(0,200));

  const raw = d.content.map(function(b){ return b.text || ''; }).join('');
  console.log('[PokeScan] raw:', raw.substring(0,400));

  // Strip code fences
  var stripped = raw.replace(/```json/gi,'').replace(/```/g,'').trim();

  // Extract outermost { ... }
  var start = stripped.indexOf('{');
  var end = stripped.lastIndexOf('}');
  if(start === -1 || end === -1 || end <= start) {
    throw new Error('JSON nao encontrado. Resposta: ' + raw.substring(0,300));
  }

  var jsonStr = stripped.substring(start, end+1);
  try {
    return JSON.parse(jsonStr);
  } catch(e) {
    throw new Error('JSON invalido: ' + e.message + ' | Inicio: ' + jsonStr.substring(0,150));
  }
}

// ── Render ────────────────────────────────────────────────
function renderResults(matches, tcgVersionsArr) {
  const total = tcgVersionsArr.length;
  const confirmed = matches.filter(m => m.matched_id && m.confidence !== 'low').length;

  document.getElementById('resultsCount').textContent = `${total} carta${total!==1?'s':''}`;

  // Summary bar
  const sb = document.getElementById('summaryBar');
  sb.innerHTML = '';
  const addPill = (label, val) => {
    const p = document.createElement('div');
    p.className='summary-pill';
    p.innerHTML=`${label}: <span>${val}</span>`;
    sb.appendChild(p);
  };
  addPill('Total', total);
  addPill('✅ Confirmadas', confirmed);
  if(total - confirmed > 0) addPill('⚠️ Incertas', total - confirmed);

  // Card list
  const cl = document.getElementById('cardList');
  cl.innerHTML = '';

  tcgVersionsArr.forEach((item, i) => {
    const match = matches.find(m => m.index === i) || {};
    const versions = item.versions || [];
    const card = item.card;

    // Find matched version object
    const matchedVersion = versions.find(v => v.id === match.matched_id);
    const displayNum = matchedVersion
      ? (matchedVersion.localId && matchedVersion.set?.cardCount?.total
          ? `${matchedVersion.localId}/${matchedVersion.set.cardCount.total}`
          : matchedVersion.localId || '?')
      : '?';

    const imgUrl = matchedVersion?.image ? matchedVersion.image + '/low.webp' : null;
    const setName = match.matched_set || matchedVersion?.set?.name || '—';
    const setId = (match.matched_set_id || matchedVersion?.set?.id || '').toUpperCase();
    const rarity = match.matched_rarity || matchedVersion?.rarity || '—';

    const statusClass = match.matched_id
      ? (match.confidence==='high' ? 'confirmed' : 'unconfirmed')
      : 'failed';
    const statusBadge = match.matched_id
      ? (match.confidence==='high'
          ? '<span class="status-badge status-confirmed">✅ Confirmada</span>'
          : '<span class="status-badge status-partial">⚠️ Incerta</span>')
      : '<span class="status-badge status-failed">❌ Não encontrada</span>';

    const row = document.createElement('div');
    row.className = `card-row ${statusClass}`;
    row.innerHTML = `
      <div class="card-row-header" onclick="toggleDetail(${i})">
        <div class="card-index">${i+1}</div>
        ${imgUrl
          ? `<img class="card-thumb" src="${imgUrl}" onerror="this.outerHTML='<div class=\\'card-thumb no-img\\'>🃏</div>'" alt="">`
          : `<div class="card-thumb no-img">🃏</div>`}
        <div class="card-info">
          <div class="card-name">${card.name}</div>
          <div class="card-meta">${setName}${setId ? ' · '+setId : ''} · ${card.language||'?'}</div>
        </div>
        <div class="card-badges">
          <div class="card-number">${displayNum}</div>
          ${statusBadge}
        </div>
      </div>
      <div class="card-detail" id="detail-${i}">
        <div class="detail-divider"></div>
        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-label">Número Confirmado</div>
            <div class="detail-value yellow" style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem">${displayNum}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Set</div>
            <div class="detail-value blue">${setName}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Raridade</div>
            <div class="detail-value">${rarity}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">HP</div>
            <div class="detail-value">${card.hp ? card.hp+' HP' : '—'}</div>
          </div>
        </div>
        ${match.reason ? `<div class="detail-note">🔍 ${match.reason}</div>` : ''}
        ${versions.length > 1 ? `
          <div class="versions-label">Todas as versões encontradas (toque para selecionar)</div>
          <div class="versions-scroll" id="versions-${i}">
            ${versions.map(v => {
              const vNum = v.localId && v.set?.cardCount?.total ? `${v.localId}/${v.set.cardCount.total}` : v.localId||'?';
              const isSelected = v.id === match.matched_id;
              return `<div class="version-item ${isSelected?'selected':''}" onclick="selectVersion(${i},'${v.id}',event)" title="${v.set?.name||''} · ${vNum}">
                <img class="version-img" src="${v.image?v.image+'/low.webp':''}" onerror="this.style.opacity='.3'" alt="">
                <div class="version-num">${vNum}</div>
              </div>`;
            }).join('')}
          </div>` : ''}
      </div>`;
    cl.appendChild(row);
  });

  // Store versions data for selectVersion
  window._tcgVersionsArr = tcgVersionsArr;
  window._matchesArr = matches;

  resultsEl.classList.add('show');
  setTimeout(() => resultsEl.scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function toggleDetail(i) {
  const d = document.getElementById(`detail-${i}`);
  d.classList.toggle('show');
}

function selectVersion(cardIdx, versionId, e) {
  e.stopPropagation();
  const item = window._tcgVersionsArr?.[cardIdx];
  if(!item) return;
  const v = item.versions.find(v => v.id === versionId);
  if(!v) return;

  // Update visual selection
  document.querySelectorAll(`#versions-${cardIdx} .version-item`).forEach(el => el.classList.remove('selected'));
  e.currentTarget.classList.add('selected');

  // Update displayed number and set
  const displayNum = v.localId && v.set?.cardCount?.total ? `${v.localId}/${v.set.cardCount.total}` : v.localId||'?';
  const row = document.querySelectorAll('.card-row')[cardIdx];
  if(row) {
    row.querySelector('.card-number').textContent = displayNum;
    row.querySelector('.card-meta').textContent = `${v.set?.name||'—'} · ${(v.set?.id||'').toUpperCase()} · ${item.card.language||'?'}`;
    // Update thumb
    const thumb = row.querySelector('.card-thumb');
    if(thumb && v.image) thumb.src = v.image+'/low.webp';
    // Update detail grid
    const detailNum = row.querySelector('.detail-value.yellow');
    if(detailNum) detailNum.textContent = displayNum;
  }
}

function showError(msg) { errorBox.textContent=msg; errorBox.classList.add('show'); }
